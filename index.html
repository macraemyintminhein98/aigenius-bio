<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Genius Bio</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-r from-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">AI Genius Bio</h1>
        <p class="text-lg text-gray-600 mb-6">Craft your perfect Instagram bio instantly!</p>
        <input type="text" id="keywords" placeholder="Keywords (e.g., photographer, travel)" class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-400 mb-4">
        <button id="generateBtn" class="bg-purple-600 text-white font-semibold py-3 px-6 rounded-md hover:bg-purple-700 transition duration-300 mb-6">Generate Bio</button>
        <div id="bioOutput" class="bg-gray-100 p-4 rounded-md text-left text-gray-700 min-h-[80px] flex items-center justify-center mb-4">
            No bio generated yet.
        </div>
        <button id="copyBtn" class="bg-green-500 text-white font-semibold py-2 px-4 rounded-md hover:bg-green-600 transition duration-300 hidden">Copy Bio</button>
        <div class="mt-8 text-gray-500 text-sm">
            Powered by AI. &copy; 2023 AI Genius Bio.
        </div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const keywordsInput = document.getElementById('keywords');
        const bioOutput = document.getElementById('bioOutput');
        const copyBtn = document.getElementById('copyBtn');

        generateBtn.addEventListener('click', async () => {
            const keywords = keywordsInput.value.trim();
            if (!keywords) {
                bioOutput.textContent = "Please enter some keywords!";
                copyBtn.classList.add('hidden');
                return;
            }
            bioOutput.textContent = "Generating...";
            copyBtn.classList.add('hidden');

            // In a real app, this would be an API call to your backend
            // For this dummy, we'll simulate a response.
            setTimeout(() => {
                const dummyBios = [
                    `📸 Wanderlust Photographer | Capturing moments, one adventure at a time. Let's create visual stories.`, 
                    `✈️ Travel Enthusiast | Exploring the world and sharing my journey. Next stop: unknown!`, 
                    `🚀 Entrepreneur & Innovator | Building the future, one idea at a time. DM for collaborations.`, 
                    `✨ Creator | Spreading positivity & inspiration. Join my journey!`, 
                    `☕ Coffee Lover & Bookworm | Finding joy in the little things.`
                ];
                const generatedBio = dummyBios[Math.floor(Math.random() * dummyBios.length)];

                bioOutput.textContent = generatedBio;
                copyBtn.classList.remove('hidden');
            }, 1500);
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(bioOutput.textContent).then(() => {
                alert('Bio copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        });
    </script>
</body>
</html>
